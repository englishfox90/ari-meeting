<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" fill="none" stroke="currentColor" stroke-linecap="round" role="img" aria-label="Ari Meetings app-icon glyph — the mark, icon-weight cut">
  <!-- App-icon cut of the R2 "Dictation" mark: same drawing as mark-full.svg, stroke weights ~1.3x
       heavier so the gesture holds presence at dock scale.
       Compositing: place on the standard macOS squircle field (22.37% corner radius) —
       porcelain #FAF8F5 field with Iron Gall #152C66 ink in light; espresso #211E1B field with
       paper-white #EDE8E1 ink in dark. Scale so the gesture spans ~60% of the field, centered
       (e.g. in a 512 field: translate(39 119) scale(3.8)). Export sizes: 512/256/128.
       At 32px and below do NOT use this artwork — switch to the simplified heavier cut:
       single-weight "a" (bowl + stem) with the run-out shortened to its first upturn. -->
